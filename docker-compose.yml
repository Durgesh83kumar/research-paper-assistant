version: '3.8'

services:
  research-paper-assistant:
    build: .
    container_name: research-paper-assistant
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s